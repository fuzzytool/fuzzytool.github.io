site_name: fuzzytool
site_description: A clean, extensible fuzzy-logic toolkit in pure Python + NumPy.
site_url: https://fuzzytool.github.io/
repo_url: https://github.com/fuzzytool/fuzzytool.github.io
repo_name: fuzzytool/fuzzytool.github.io
docs_dir: docs
site_dir: site
copyright: 'Created by <a href="https://salmeron.cunef.edu">Jose L. Salmeron</a>'

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - search.suggest
    - search.highlight
    - toc.follow

nav:
  - Home: index.md
  - Installation: installation.md
  - Getting started: getting-started.md
  - Guide:
      - Membership functions: guide/membership.md
      - Variables & rules: guide/rules.md
      - Mamdani inference: guide/mamdani.md
      - 'Example: fraud-alert score': guide/fraud-alert.md
      - Takagi-Sugeno (TSK): guide/tsk.md
      - Interval type-2 (IT2): guide/type2.md
      - Fuzzy clustering: guide/clustering.md
      - ANFIS (trainable TSK): guide/anfis.md
      - F-transform: guide/ftransform.md
      - Rule learning: guide/rule-learning.md
      - Fuzzy numbers & MCDM: guide/mcdm.md
      - Batch, I/O & sklearn: guide/batch-and-io.md
      - Defuzzification: guide/defuzzification.md
      - Visualization: guide/visualization.md
  - Extending: extending.md
  - Citing & releasing: citing.md
  - API reference: api/python.md

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/fuzzytool/fuzzytool.github.io
      name: fuzzytool on GitHub
    - icon: fontawesome/brands/orcid
      link: https://orcid.org/0000-0001-7811-3716
      name: Jose L. Salmeron on ORCID
    - icon: fontawesome/solid/globe
      link: https://salmeron.cunef.edu
      name: Jose L. Salmeron's website

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_root_heading: true
            show_source: false
            members_order: source
            separate_signature: true
            show_signature_annotations: true
